<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Ensign</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Raleway', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            color: black;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 30px;
        }
        a {
            color: black;
            text-decoration: none;
            padding: 15px;
            border: 2px solid black;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 25px;
            height: 25px;
        }
        a:hover {
            background: black;
        }
        a:hover svg {
            fill: white;
        }
        svg {
            width: 20px;
            height: 20px;
            fill: black;
            transition: all 0.3s ease;
        }
        .copyright {
            font-size: 0.9rem;
            color: #666;
            margin-top: 50px;
        }
    </style>
</head>
